const mEl=document.getElementById('masonry');
let filter='all', cur=[], mounted=false;
function cols(){ const w=innerWidth; return w>=1500?5:w>=1000?4:w>=600?3:w>=400?2:1; }
function visible(){ return ALL.filter(it=>filter==='all'||it.site===filter); }
function build(){
  const list=visible(); cur=list;
  // create/remove nodes
  mEl.innerHTML='';
  list.forEach(it=>{
    const d=document.createElement('div'); d.className='m-item'; d.dataset.key=it.id;
    d.innerHTML='<div class="m-img" data-cap="'+it.site+' · '+it.sname+'" style="background-image:url('+it.img+')"></div>';
    d.addEventListener('click',()=>openLb(it));
    d.addEventListener('mouseenter',()=>gsap.to('[data-key=\''+CSS.escape(it.id)+'\']',{scale:.97,duration:.3,ease:'power2.out'}));
    d.addEventListener('mouseleave',()=>gsap.to('[data-key=\''+CSS.escape(it.id)+'\']',{scale:1,duration:.3,ease:'power2.out'}));
    mEl.appendChild(d);
  });
  layout(true);
}
function layout(animate){
  const c=cols(), W=mEl.clientWidth, cw=W/c, colH=new Array(c).fill(0);
  const nodes=[...mEl.children];
  nodes.forEach((node,i)=>{
    const it=cur[i]; const col=colH.indexOf(Math.min(...colH));
    const x=cw*col, h=cw*it.ar, y=colH[col]; colH[col]+=h;
    const sel='[data-key=\''+CSS.escape(it.id)+'\']';
    const props={x,y,width:cw,height:h};
    if(!mounted && animate){
      gsap.fromTo(sel,{opacity:0,x,y:y+window.innerHeight*0.15,width:cw,height:h,filter:'blur(12px)'},
        {opacity:1,x,y,width:cw,height:h,filter:'blur(0px)',duration:.8,ease:'power3.out',delay:i*0.04});
    } else {
      gsap.to(sel,{...props,duration:.6,ease:'power3.out',overwrite:'auto'});
    }
  });
  mEl.style.height=Math.max(...colH)+'px';
  mounted=true;
}
// filters
document.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); ch.classList.add('on');
  filter=ch.dataset.site; mounted=false; build();
}));
let rt; addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>layout(false),150);});
// preload then build
Promise.all(ALL.slice(0,40).map(it=>new Promise(r=>{const i=new Image();i.onload=i.onerror=r;i.src=it.img;}))).then(()=>build());
setTimeout(()=>{if(!mounted)build();},1200);
// lightbox
const lb=document.getElementById('lb'),lbImg=document.getElementById('lbImg'),lbCap=document.getElementById('lbCap'),lbSite=document.getElementById('lbSite');
let li=0;
function openLb(it){ li=cur.indexOf(it); lbSite.textContent=it.site+' · '+it.sname; showLb(); lb.classList.add('on'); }
function showLb(){ const it=cur[li]; lbImg.src=it.img; lbCap.textContent=(li+1)+' / '+cur.length+'  ·  '+it.sname; lbSite.textContent=it.site+' · '+it.sname; }
document.getElementById('lbX').onclick=()=>lb.classList.remove('on');
document.getElementById('lbPrev').onclick=()=>{li=(li-1+cur.length)%cur.length;showLb();};
document.getElementById('lbNext').onclick=()=>{li=(li+1)%cur.length;showLb();};
lb.addEventListener('click',e=>{if(e.target===lb)lb.classList.remove('on');});
addEventListener('keydown',e=>{if(!lb.classList.contains('on'))return;if(e.key==='Escape')lb.classList.remove('on');if(e.key==='ArrowRight')document.getElementById('lbNext').click();if(e.key==='ArrowLeft')document.getElementById('lbPrev').click();});
